requirement:
  id: PRD-123
  name: feature_foo
  summary: Explain what changed in Flutter as product intent.

intent_scope:
  primary_features:
    - feature_foo
  supporting_features:
    []
  flutter_paths:
    - lib/features/feature_foo/
  change_basis:
    - flutter_digest
    - flutter_pr_diff
  change_ref: feature-foo.diff

intent_units:
  -
    intent_id: ui_01
    intent_type: ui_flow
    screen_name: FeatureFooPage
    screen_path: lib/features/feature_foo/feature_foo_page.dart
    screen_role: primary_screen
    interactions:
      - onTap
    states:
      - loading
      - loaded
      - error
    acceptance_points:
      - User can open feature foo main screen.
  -
    intent_id: data_01
    intent_type: data_flow
    api_calls:
      - getFeatureFoo
    models:
      - FeatureFooModel
    states:
      - loading
      - loaded
      - error
    acceptance_points:
      - Data should be loaded and rendered.

behavior_contract:
  user_flows:
    - open_feature_foo
    - tap_primary_action
  acceptance_points:
    - Primary feature behavior matches Flutter.
  strings:
    - feature_foo_title
  assets:
    - assets/feature_foo_header.png
